# ============================================================
# datafast — Nginx reverse proxy config
#
# Domain:  datafastbyte.com (+ www redirect)
# App:     Next.js running on 127.0.0.1:3011 (PM2 process "datafast")
# Webhook: GitHub deploy listener on 127.0.0.1:9011 (PM2 "datafast-webhook")
#
# Install on VPS (Ubuntu/Debian):
#   sudo cp /var/www/datafast/nginx/datafast.conf /etc/nginx/sites-available/datafast
#   sudo ln -s /etc/nginx/sites-available/datafast /etc/nginx/sites-enabled/datafast
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d datafastbyte.com -d www.datafastbyte.com
# ============================================================

upstream datafast_app {
    server 127.0.0.1:3011;
    keepalive 64;
}

# ── Redirect www → apex (over http; certbot will mirror this for https) ──
server {
    listen 80;
    listen [::]:80;
    server_name www.datafastbyte.com;
    return 301 http://datafastbyte.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name datafastbyte.com;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Increase body size for file uploads / bulk operations
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_pass http://datafast_app;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Next.js image optimization
    location /_next/image {
        proxy_pass http://datafast_app;
        proxy_cache_valid 200 1d;
    }

    # Public static files
    location /public/ {
        proxy_pass http://datafast_app;
        add_header Cache-Control "public, max-age=3600";
    }

    # Paystack & DataHubGH webhooks — no aggressive timeout
    location /api/webhooks/ {
        proxy_pass http://datafast_app;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cron endpoint — internal only (block external access)
    location /api/cron/ {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://datafast_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # GitHub deploy webhook — proxies to the listener on port 9011
    location /deploy-hook {
        proxy_pass http://127.0.0.1:9011/deploy-hook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Hub-Signature-256 $http_x_hub_signature_256;
        proxy_read_timeout 10s;
    }

    # All other routes
    location / {
        proxy_pass http://datafast_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }
}
